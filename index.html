<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A static website hosted on AWS S3." />
  <title>My S3 Static Website</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e1b4b);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }
    h1 { font-size: 2rem; margin-bottom: 0.75rem; }
    .accent { color: var(--accent); }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    footer { margin-top: 2rem; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Deployed on AWS S3</span>
    <h1>Hello from <span class="accent">the Cloud!</span> 👋</h1>
    <p>
      This is a simple static website hosted on Amazon S3.
      Edit <strong>index.html</strong>, push to your repo, and let
      CI/CD deploy it automatically.
    </p>
    <footer>&copy; <span id="year"></span> Your Name — Built with S3 + CloudFront</footer>
  </main>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
