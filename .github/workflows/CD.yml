name: 'CD_workflow'


on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-job:
    runs-on: ubuntu-latest
    outputs:
      s3_dev_bucket_name: ${{ steps.get_bucket_name.outputs.s3_dev_bucket_name }}
    steps:
      # Checkout repo first so that git context and repository files are available
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger_Terraform_workflow
        id: Trigger_Terraform_workflow
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_GITHUB_TOKEN }} # Default GITHUB_TOKEN won't trigger other workflows!
        run: |
          gh workflow run terraform.yml
          sleep 10
          # Get the run ID of the triggered workflow
          RUN_ID=$(gh run list --workflow=terraform.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Watching workflow run: $RUN_ID"
          gh run watch "$RUN_ID" --exit-status

      - name: Get S3 Bucket Name
        id: get_bucket_name
        run: |
          PREFIX=$(grep -E '^\s*bucket_prefix\s*=' .terraform/terraform.tfvars | cut -d'"' -f2)
          BUCKET_NAME="dev-bucket-${PREFIX}-1997"
          echo "s3_dev_bucket_name=${BUCKET_NAME}" >> $GITHUB_OUTPUT

  deploy:
    needs: trigger-job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - uses: jakejarvis/s3-sync-action@master
        with:
          # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are resolved from environment
          AWS_S3_BUCKET: ${{ needs.trigger-job.outputs.s3_dev_bucket_name }}
          AWS_REGION: 'eu-north-1'
          args: --follow-symlinks --delete --exclude '.git/*' --exclude '.gitignore' --exclude '.github/*' --exclude 'LICENSE.md' --exclude 'README.md'

